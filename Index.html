<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ToDo List App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>ToDo List</h1>
        <div class="todo-input">
            <input type="text" id="todoInput" placeholder="Add a new task...">
            <button id="addTodoBtn">Add</button>
        </div>
        <ul id="todoList"></ul>
        <div id="listsContainer"></div>
        <div class="attachment-wrapper">
            <button id="fabBtn" class="fab-btn">+</button>
            <div id="attachmentMenu" class="attachment-menu hidden">
                <button onclick="createNewList('🖼️ Gallery')">🖼️ Gallery</button>
                <button onclick="createNewList('📄 Docs')">📄 Docs</button>
                <button onclick="createNewList('🎙️ Audio')">🎙️ Audio</button>
                <button onclick="createNewList('🎨 Draw')">🎨 Draw</button>
                <button onclick="createNewList('✅ New List')">✅ New List</button>
                <button id="closeMenu" class="close-btn">Close</button>
            </div>
        </div>
        <div id="statusBar" class="status-bar">0 items remaining</div>
    </div>
    <script src="script.js"></script>
</body>
</html>
